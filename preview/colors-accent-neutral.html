<!-- @dsCard group="Colors" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px;font-family:var(--font-sans);}
.row{display:flex;gap:12px;flex-wrap:wrap;}
.sw{border-radius:12px;overflow:hidden;width:120px;box-shadow:var(--shadow-sm);}
.swatch{height:80px;}
.lab{background:#fff;padding:9px 11px;}
.lab b{display:block;font-size:12.5px;color:var(--ink);}
.lab code{font-size:10.5px;color:var(--ink-soft);font-family:ui-monospace,monospace;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#D85A30"></div><div class="lab"><b>Coral</b><code>#D85A30</code></div></div>
  <div class="sw"><div class="swatch" style="background:oklch(0.93 0.04 45);border:1px solid #e8ddd8"></div><div class="lab"><b>Coral soft</b><code>fondo suave</code></div></div>
  <div class="sw"><div class="swatch" style="background:#F1EFE8;border:1px solid #e5e2da"></div><div class="lab"><b>Cream</b><code>#F1EFE8</code></div></div>
  <div class="sw"><div class="swatch" style="background:#2C2C2A"></div><div class="lab"><b>Ink</b><code>#2C2C2A</code></div></div>
  <div class="sw"><div class="swatch" style="background:oklch(0.46 0.012 110)"></div><div class="lab"><b>Ink soft</b><code>texto muted</code></div></div>
  <div class="sw"><div class="swatch" style="background:#fff;border:1px solid #e8e5de"></div><div class="lab"><b>White</b><code>#FFFFFF</code></div></div>
</div>
</body></html>
