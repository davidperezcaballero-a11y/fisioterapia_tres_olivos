<!-- @dsCard group="Spacing" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px 28px;font-family:var(--font-sans);}
.grid{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.box{display:flex;flex-direction:column;align-items:center;gap:6px;}
.r{background:var(--teal);opacity:.9;}
.lab{font-size:10.5px;color:var(--ink-soft);text-align:center;font-family:ui-monospace,monospace;}
.name{font-size:11.5px;font-weight:600;color:var(--ink);}
</style></head><body>
<div class="grid">
  <div class="box"><div class="r" style="width:40px;height:8px;border-radius:var(--r-sm)"></div><div class="name">xs</div><div class="lab">8px</div></div>
  <div class="box"><div class="r" style="width:40px;height:16px;border-radius:var(--r-sm)"></div><div class="name">sm</div><div class="lab">16px</div></div>
  <div class="box"><div class="r" style="width:40px;height:24px;border-radius:var(--r-sm)"></div><div class="name">md</div><div class="lab">24px</div></div>
  <div class="box"><div class="r" style="width:40px;height:40px;border-radius:var(--r-sm)"></div><div class="name">lg</div><div class="lab">40px</div></div>
  <div class="box"><div class="r" style="width:40px;height:64px;border-radius:var(--r-sm)"></div><div class="name">xl</div><div class="lab">64px</div></div>
  <div class="box"><div class="r" style="width:40px;height:96px;border-radius:var(--r-sm)"></div><div class="name">2xl</div><div class="lab">96px</div></div>
</div>
<div style="margin-top:20px;border-top:1px solid var(--line);padding-top:16px;">
<div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600;margin-bottom:10px;">Radios de borde</div>
<div style="display:flex;gap:14px;flex-wrap:wrap;">
  <div style="text-align:center;"><div style="width:50px;height:50px;background:var(--teal-light);border-radius:var(--r-sm)"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:5px;">sm·10</div></div>
  <div style="text-align:center;"><div style="width:50px;height:50px;background:var(--teal-light);border-radius:var(--r-md)"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:5px;">md·18</div></div>
  <div style="text-align:center;"><div style="width:50px;height:50px;background:var(--teal-light);border-radius:var(--r-lg)"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:5px;">lg·28</div></div>
  <div style="text-align:center;"><div style="width:50px;height:50px;background:var(--teal-light);border-radius:var(--r-xl)"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:5px;">xl·40</div></div>
  <div style="text-align:center;"><div style="width:50px;height:50px;background:var(--teal-light);border-radius:999px"></div><div style="font-size:10px;color:var(--ink-soft);margin-top:5px;">pill</div></div>
</div></div>
</body></html>
