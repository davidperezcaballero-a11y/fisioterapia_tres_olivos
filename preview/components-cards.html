<!-- @dsCard group="Components" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px 28px;font-family:var(--font-sans);}
.meta{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:600;margin-bottom:12px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);padding:28px 26px;max-width:280px;}
.card h3{font-family:var(--font-serif);font-size:22px;color:var(--teal-deep);font-weight:600;margin:18px 0 8px;}
.card p{font-size:14px;color:var(--ink-soft);margin-bottom:14px;}
.more{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--coral);}
.more svg{width:14px;height:14px;}
.stars{display:flex;gap:3px;color:var(--coral);margin-bottom:10px;}
.stars svg{width:14px;height:14px;fill:currentColor;}
.quote-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-md);padding:26px;max-width:260px;}
.quote-card p{font-family:var(--font-serif);font-size:18px;line-height:1.4;color:var(--teal-deep);margin-bottom:14px;}
.who{display:flex;align-items:center;gap:10px;}
.av{width:38px;height:38px;border-radius:50%;background:var(--teal-light);display:grid;place-items:center;color:var(--teal-deep);font-weight:700;font-size:14px;}
.who b{font-size:13.5px;color:var(--ink);}
.who span{font-size:11.5px;color:var(--ink-soft);display:block;}
.row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;}
</style></head><body>
<div class="meta">Tarjeta de servicio</div>
<div class="row">
<div class="card">
  <div class="ico"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></div>
  <h3>Terapia manual</h3>
  <p>Manos expertas que leen tu tejido y trabajan donde lo necesitas.</p>
  <a class="more">Saber más <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
</div>
<div class="quote-card">
  <div class="stars"><svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5.2 4.8 1.4 6.9L12 17.8 5.8 21l1.4-6.9L2 9.3l7-.8z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5.2 4.8 1.4 6.9L12 17.8 5.8 21l1.4-6.9L2 9.3l7-.8z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5.2 4.8 1.4 6.9L12 17.8 5.8 21l1.4-6.9L2 9.3l7-.8z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5.2 4.8 1.4 6.9L12 17.8 5.8 21l1.4-6.9L2 9.3l7-.8z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .8-5.2 4.8 1.4 6.9L12 17.8 5.8 21l1.4-6.9L2 9.3l7-.8z"/></svg></div>
  <p>"Por fin alguien que entiende el origen de mi dolor."</p>
  <div class="who"><div class="av">E</div><div><b>Paciente</b><span>Lumbalgia crónica</span></div></div>
</div>
</div>
</body></html>
