<!-- @dsCard group="Spacing" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:28px 32px;font-family:var(--font-sans);}
.row{display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
.card{background:var(--white);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;width:100px;height:70px;}
.lab{font-size:10.5px;color:var(--ink-soft);text-align:center;margin-top:8px;font-family:ui-monospace,monospace;}
.col{display:flex;flex-direction:column;align-items:center;}
</style></head><body>
<div class="row">
  <div class="col"><div class="card" style="box-shadow:var(--shadow-sm)"><span style="font-size:11px;color:var(--ink-soft)">shadow-sm</span></div><div class="lab">6px · teal .06</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--shadow-md)"><span style="font-size:11px;color:var(--ink-soft)">shadow-md</span></div><div class="lab">18px · teal .10</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--shadow-lg)"><span style="font-size:11px;color:var(--ink-soft)">shadow-lg</span></div><div class="lab">70px · teal .16</div></div>
</div>
<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);">Las sombras usan el teal como color de tinte (no negro), lo que da calidez premium.</div>
</body></html>
