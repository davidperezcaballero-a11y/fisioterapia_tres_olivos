<!-- @dsCard group="Brand" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:0;font-family:var(--font-sans);}
.row{display:flex;height:150px;}
.panel{flex:1;display:flex;align-items:center;justify-content:center;padding:28px;}
.panel img{max-height:90px;width:auto;}
.brand-row{display:flex;align-items:center;gap:14px;}
.brand-row .wm b{font-family:var(--font-serif);font-weight:600;font-size:28px;color:var(--teal-deep);display:block;line-height:1;}
.brand-row .wm span{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-top:4px;display:block;}
.dark{background:var(--teal-darkest);}
.dark .wm b{color:var(--cream) !important;}
.dark .wm span{color:var(--teal-light) !important;}
</style></head><body>
<div class="row">
  <div class="panel" style="background:var(--cream);">
    <div class="brand-row">
      <img src="../assets/emblema-manos.png" alt="Emblema 3 Olivos" style="height:72px;">
      <div class="wm"><b>3 Olivos</b><span>Fisioterapia</span></div>
    </div>
  </div>
  <div class="panel dark">
    <div class="brand-row">
      <img src="../assets/emblema-manos-light.png" alt="Emblema 3 Olivos claro" style="height:72px;">
      <div class="wm"><b>3 Olivos</b><span>Fisioterapia</span></div>
    </div>
  </div>
</div>
</body></html>
