<!-- @dsCard group="Type" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:28px 32px;}
.sp{margin-bottom:22px;}
.meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
.quote-ex{font-family:var(--font-serif);font-size:26px;font-style:italic;font-weight:500;color:var(--teal-deep);line-height:1.25;}
.num-ex{font-family:var(--font-serif);font-size:52px;font-weight:600;color:var(--teal-deep);line-height:1;}
.num-label{font-size:13px;color:var(--ink-soft);margin-top:3px;}
.nums{display:flex;gap:36px;align-items:flex-end;}
.sign{font-weight:600;color:var(--teal-deep);font-size:15px;margin-top:10px;}
</style></head><body>
<div class="sp"><div class="meta">Serif Quote / Blockquote</div>
<div class="quote-ex">"¿Esto funciona de verdad? Sí."</div>
<div class="sign">— El equipo de Fisioterapia 3 Olivos</div></div>
<div class="sp"><div class="meta">Numerales de impacto (serif)</div>
<div class="nums">
  <div><div class="num-ex">25+</div><div class="num-label">años de experiencia</div></div>
  <div><div class="num-ex">1 a 1</div><div class="num-label">mismo fisioterapeuta</div></div>
  <div><div class="num-ex">100%</div><div class="num-label">personalizado</div></div>
</div></div>
</body></html>
