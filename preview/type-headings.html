<!-- @dsCard group="Type" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:28px 32px;font-family:var(--font-sans);}
.sp{margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:20px;}
.sp:last-child{border:0;margin:0;}
.meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
.d1{font-family:var(--font-serif);font-size:56px;font-weight:600;line-height:.98;color:var(--teal-deep);}
.d1 em{font-style:italic;color:var(--coral);}
.h2s{font-family:var(--font-serif);font-size:38px;font-weight:600;line-height:1.08;color:var(--teal-deep);}
.h3s{font-family:var(--font-serif);font-size:26px;font-weight:600;color:var(--teal-deep);}
</style></head><body>
<div class="sp"><div class="meta">Display / H1 — Cormorant Garamond 600</div>
<div class="d1">Fisioterapia cercana, <em>personal</em></div></div>
<div class="sp"><div class="meta">H2 — Cormorant Garamond 600</div>
<div class="h2s">Un plan pensado para tu lesión</div></div>
<div class="sp"><div class="meta">H3 — Cormorant Garamond 600</div>
<div class="h3s">Terapia manual personalizada</div></div>
</body></html>
