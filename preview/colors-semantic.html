<!-- @dsCard group="Colors" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px;font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.row{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:10px;padding:12px 14px;border:1px solid var(--line);}
.dot{width:32px;height:32px;border-radius:8px;flex:none;}
.lab b{display:block;font-size:12px;color:var(--ink);font-weight:600;}
.lab span{font-size:11px;color:var(--ink-soft);}
</style></head><body>
<div class="grid">
  <div class="row"><div class="dot" style="background:var(--teal-deep)"></div><div class="lab"><b>--teal-deep</b><span>Titulares, CTA prim.</span></div></div>
  <div class="row"><div class="dot" style="background:var(--teal)"></div><div class="lab"><b>--teal</b><span>Eyebrows, labels</span></div></div>
  <div class="row"><div class="dot" style="background:var(--coral)"></div><div class="lab"><b>--coral</b><span>CTA cálido, énfasis</span></div></div>
  <div class="row"><div class="dot" style="background:var(--cream);border:1px solid var(--line)"></div><div class="lab"><b>--cream</b><span>Fondo principal</span></div></div>
  <div class="row"><div class="dot" style="background:var(--white);border:1px solid var(--line)"></div><div class="lab"><b>--white</b><span>Tarjetas, secciones</span></div></div>
  <div class="row"><div class="dot" style="background:var(--teal-darkest)"></div><div class="lab"><b>--teal-darkest</b><span>Footer, proceso</span></div></div>
</div>
</body></html>
