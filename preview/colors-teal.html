<!-- @dsCard group="Colors" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px;font-family:var(--font-sans);}
.row{display:flex;gap:12px;flex-wrap:wrap;}
.sw{border-radius:12px;overflow:hidden;width:120px;box-shadow:var(--shadow-sm);}
.swatch{height:80px;}
.lab{background:#fff;padding:9px 11px;}
.lab b{display:block;font-size:12.5px;color:var(--ink);}
.lab code{font-size:10.5px;color:var(--ink-soft);font-family:ui-monospace,monospace;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#0F6E56"></div><div class="lab"><b>Teal deep</b><code>#0F6E56</code></div></div>
  <div class="sw"><div class="swatch" style="background:#1D9E75"></div><div class="lab"><b>Teal</b><code>#1D9E75</code></div></div>
  <div class="sw"><div class="swatch" style="background:#9FE1CB"></div><div class="lab"><b>Teal light</b><code>#9FE1CB</code></div></div>
  <div class="sw"><div class="swatch" style="background:oklch(0.34 0.072 168)"></div><div class="lab"><b>Teal darkest</b><code>footer/proceso</code></div></div>
  <div class="sw"><div class="swatch" style="background:oklch(0.96 0.018 165);border:1px solid #e0ece8"></div><div class="lab"><b>Teal tint</b><code>fondo lavado</code></div></div>
</div>
</body></html>
