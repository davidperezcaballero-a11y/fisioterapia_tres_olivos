<!-- @dsCard group="Type" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:28px 32px;font-family:var(--font-sans);}
.sp{margin-bottom:20px;}
.meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
.eb1{font-weight:600;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--teal);display:inline-flex;align-items:center;gap:12px;}
.eb1::before{content:"";width:26px;height:1.5px;background:var(--coral);display:inline-block;border-radius:2px;}
.eb2{font-weight:600;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--teal-light);}
.step-num{font-family:var(--font-serif);font-size:52px;color:var(--teal-light);font-weight:600;line-height:1;}
</style></head><body>
<div class="sp"><div class="meta">Eyebrow — con regla coral (fondo claro)</div>
<div class="eb1">Fisioterapia en Madrid · desde 1999</div></div>
<div class="sp" style="background:var(--teal-darkest);padding:18px 20px;border-radius:12px;">
<div class="meta" style="color:var(--teal-light);">Eyebrow — sin regla (fondo oscuro)</div>
<div class="eb2">Cómo trabajamos</div></div>
<div class="sp"><div class="meta">Número de paso (proceso)</div>
<div class="step-num">01</div></div>
</body></html>
