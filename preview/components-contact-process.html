<!-- @dsCard group="Components" --><!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--cream);padding:24px 28px;font-family:var(--font-sans);}
.meta{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:600;margin-bottom:10px;}
.contact-row{display:flex;gap:14px;align-items:center;background:var(--white);border-radius:var(--r-md);padding:18px 20px;margin-bottom:10px;border:1px solid var(--line);}
.contact-row b{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:3px;}
.contact-row span{font-size:15px;color:var(--ink);}
.step{display:flex;gap:20px;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--line);}
.step:last-child{border:0;}
.num{font-family:var(--font-serif);font-size:40px;color:var(--teal-light);font-weight:600;line-height:1;min-width:52px;}
.step h4{font-family:var(--font-serif);font-size:22px;color:var(--teal-deep);font-weight:600;margin:0 0 5px;}
.step p{font-size:13.5px;color:var(--ink-soft);margin:0;}
.dark-box{background:var(--teal-darkest);border-radius:var(--r-md);padding:22px 24px;}
</style></head><body>
<div class="meta">Fila de contacto</div>
<div class="contact-row">
  <div class="ico sm"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
  <div><b>Teléfono</b><span>91 735 33 03</span></div>
</div>
<div class="meta" style="margin-top:16px;">Pasos del proceso (fondo oscuro)</div>
<div class="dark-box">
  <div class="step"><div class="num">01</div><div><h4 style="color:var(--cream);">Te escuchamos</h4><p style="color:rgba(241,239,232,.7);">Valoración sin prisa antes de proponer nada.</p></div></div>
  <div class="step"><div class="num">02</div><div><h4 style="color:var(--cream);">Diagnóstico preciso</h4><p style="color:rgba(241,239,232,.7);">Entender el problema es la mitad del tratamiento.</p></div></div>
</div>
</body></html>
